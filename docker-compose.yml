services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: stylish
      POSTGRES_USER: stylish
      POSTGRES_PASSWORD: stylish
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stylish -d stylish"]
      interval: 5s
      timeout: 3s
      retries: 20

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: stylish
      MINIO_ROOT_PASSWORD: stylish123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 stylish stylish123 &&
      mc mb -p local/stylish || true
      "

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/stylish
      DB_USERNAME: stylish
      DB_PASSWORD: stylish
      MONGO_URI: mongodb://mongo:27017/authdb
      JWT_ACCESS_SECRET: dev-access-secret-change-me-dev-access-secret-change-me
      JWT_ACCESS_TTL: PT15M
      JWT_REFRESH_TTL: P30D
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 20

  generation-service:
    build:
      context: .
      dockerfile: services/generation-service/Dockerfile
    environment:
      SERVER_PORT: 8080
    ports:
      - "8083:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 20

  wardrobe-service:
    build:
      context: .
      dockerfile: services/wardrobe-service/Dockerfile
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/stylish
      DB_USERNAME: stylish
      DB_PASSWORD: stylish
      MONGO_URI: mongodb://mongo:27017/wardrobedb
      JWT_ACCESS_SECRET: dev-access-secret-change-me-dev-access-secret-change-me
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: stylish
      S3_SECRET_KEY: stylish123
      S3_REGION: us-east-1
      S3_BUCKET: stylish
      GENERATION_BASE_URL: http://generation-service:8080
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      generation-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 20

  db-client:
    image: postgres:17
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: stylish
      PGUSER: stylish
      PGPASSWORD: stylish
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sleep", "infinity"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      auth-service:
        condition: service_healthy
      wardrobe-service:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  mongo_data:

