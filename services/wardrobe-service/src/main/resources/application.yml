server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: wardrobe-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stylish}
    username: ${DB_USERNAME:stylish}
    password: ${DB_PASSWORD:stylish}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: wardrobe
  flyway:
    enabled: true
    default-schema: wardrobe
    schemas: wardrobe
    create-schemas: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:dev-access-secret-change-me-dev-access-secret-change-me}
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:stylish}
    secret-key: ${S3_SECRET_KEY:stylish123}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:stylish}
    public-url: ${S3_PUBLIC_URL:http://localhost:9000}
  generation:
    base-url: ${GENERATION_BASE_URL:http://localhost:8080}

