server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stylish}
    username: ${DB_USERNAME:stylish}
    password: ${DB_PASSWORD:stylish}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auth
  flyway:
    enabled: true
    default-schema: auth
    schemas: auth
    create-schemas: true
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/authdb}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:dev-access-secret-change-me-dev-access-secret-change-me}
    access-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-ttl: ${JWT_REFRESH_TTL:P30D}

